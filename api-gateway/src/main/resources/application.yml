server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: booking-service-bookings
          uri: lb://booking-service
          predicates:
            - Path=/api/bookings/**
        - id: booking-service-users
          uri: lb://booking-service
          predicates:
            - Path=/api/users/**
        - id: hotel-service-public
          uri: lb://hotel-service
          predicates:
            - Path=/api/hotels/**,/api/rooms/**
      server:
        webflux:
          default-filters:
            - PreserveHostHeader

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

springdoc:
  swagger-ui:
    path: /swagger-ui.html
