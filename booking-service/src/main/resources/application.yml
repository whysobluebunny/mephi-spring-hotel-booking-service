server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: booking-service
  datasource:
    url: jdbc:h2:mem:booking-db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  jackson:
    serialization:
      write-dates-as-timestamps: false

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  security:
    jwt-secret: ${APP_SECURITY_JWT_SECRET:12345678901234567890123456789012}
    token-lifetime-minutes: ${APP_SECURITY_TOKEN_LIFETIME_MINUTES:60}
  integration:
    hotel-service-url: ${HOTEL_SERVICE_URL:http://localhost:8082}
    connect-timeout-ms: ${HOTEL_SERVICE_CONNECT_TIMEOUT_MS:1000}
    read-timeout-ms: ${HOTEL_SERVICE_READ_TIMEOUT_MS:1500}
    max-attempts: ${HOTEL_SERVICE_MAX_ATTEMPTS:3}
    initial-backoff-ms: ${HOTEL_SERVICE_INITIAL_BACKOFF_MS:200}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
